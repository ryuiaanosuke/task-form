<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f5f5;
      padding: 20px 16px;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    h1 { font-size: 20px; color: #111; margin-bottom: 20px; text-align: center; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #444; margin-bottom: 6px; font-weight: 600; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 14px; border: 1.5px solid #e0e0e0;
      border-radius: 12px; font-size: 16px; color: #111; background: #fafafa;
    }
    input:focus { outline: none; border-color: #06C755; background: white; }
    .btn {
      width: 100%; padding: 16px; background: #06C755; color: white;
      border: none; border-radius: 12px; font-size: 16px; font-weight: bold;
      cursor: pointer; margin-top: 8px;
    }
    .btn:disabled { background: #ccc; }
    .btn-edit {
      padding: 10px 16px; background: #06C755; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: bold;
      cursor: pointer; width: 100%; margin-top: 8px;
    }
    .error { color: #ff4444; font-size: 14px; margin-top: 8px; text-align: center; }
    .task-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .task-name { font-size: 16px; font-weight: bold; color: #111; margin-bottom: 8px; }
    .task-detail { font-size: 13px; color: #666; margin-bottom: 4px; }
    .task-detail span { color: #111; }
    .urgency-高 { color: #ff4444; font-weight: bold; }
    .urgency-中 { color: #f5a623; font-weight: bold; }
    .urgency-低 { color: #06C755; font-weight: bold; }
    .header-bar {
      background: #06C755;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
    }
    .loading { text-align: center; padding: 40px; color: #888; }
    .empty { text-align: center; padding: 40px; color: #888; font-size: 16px; }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      overflow-y: auto;
      padding: 20px 16px;
    }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    .modal h2 { font-size: 18px; margin-bottom: 20px; text-align: center; }
    .modal-field { margin-bottom: 16px; }
    .modal-field label { display: block; font-size: 14px; color: #444; margin-bottom: 6px; font-weight: 600; }
    .modal-field input, .modal-field select, .modal-field textarea {
      width: 100%; padding: 12px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; font-size: 15px; color: #111; background: #fafafa;
      appearance: none; -webkit-appearance: none;
    }
    .modal-field textarea { height: 80px; resize: vertical; font-family: inherit; }
    .urgency-group { display: flex; gap: 10px; }
    .urgency-btn {
      flex: 1; padding: 12px 8px; border: 1.5px solid #e0e0e0;
      border-radius: 10px; background: #fafafa; font-size: 15px;
      cursor: pointer; text-align: center;
    }
    .urgency-btn.selected-高 { background: #fff0f0; border-color: #ff4444; color: #ff4444; font-weight: bold; }
    .urgency-btn.selected-中 { background: #fffbe6; border-color: #f5a623; color: #f5a623; font-weight: bold; }
    .urgency-btn.selected-低 { background: #f0fff4; border-color: #06C755; color: #06C755; font-weight: bold; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel {
      flex: 1; padding: 14px; background: #f5f5f5; color: #666;
      border: none; border-radius: 10px; font-size: 15px; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 14px; background: #06C755; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .btn-save:disabled { background: #ccc; }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-area" class="card">
    <h1>🔐 タスク管理</h1>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" onclick="login()">ログイン</button>
    <div class="error" id="login-error"></div>
  </div>

  <!-- タスク一覧 -->
  <div id="list-area" style="display:none">
    <div class="header-bar">📋 タスク一覧</div>
    <div id="loading" class="loading">読み込み中...</div>
    <div id="task-list"></div>
  </div>

  <!-- 編集モーダル -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>✏️ タスク編集</h2>
      <div class="modal-field">
        <label>タスク名</label>
        <input type="text" id="edit-name">
      </div>
      <div class="modal-field">
        <label>種類</label>
        <select id="edit-category">
          <option value="補助金業務">補助金業務</option>
          <option value="BeFP業務">BeFP業務</option>
          <option value="顧客対応">顧客対応</option>
          <option value="財務">財務</option>
          <option value="プライベート">プライベート</option>
          <option value="業務指示">業務指示</option>
        </select>
      </div>
      <div class="modal-field">
        <label>緊急性</label>
        <div class="urgency-group">
          <div class="urgency-btn" onclick="selectEditUrgency('高', this)">高</div>
          <div class="urgency-btn" onclick="selectEditUrgency('中', this)">中</div>
          <div class="urgency-btn" onclick="selectEditUrgency('低', this)">低</div>
        </div>
      </div>
      <div class="modal-field">
        <label>進捗</label>
        <select id="edit-progress">
          <option value="0%">0%</option>
          <option value="10%">10%</option>
          <option value="20%">20%</option>
          <option value="30%">30%</option>
          <option value="40%">40%</option>
          <option value="50%">50%</option>
          <option value="60%">60%</option>
          <option value="70%">70%</option>
          <option value="80%">80%</option>
          <option value="90%">90%</option>
          <option value="100%">100%</option>
        </select>
      </div>
      <div class="modal-field">
        <label>進捗状況</label>
        <select id="edit-status">
          <option value="未対応">未対応</option>
          <option value="進捗中">進捗中</option>
          <option value="待ち（顧客・取引先）">待ち（顧客・取引先）</option>
          <option value="待ち（スタッフ）">待ち（スタッフ）</option>
          <option value="スタッフ対応中">スタッフ対応中</option>
          <option value="完了">完了</option>
        </select>
      </div>
      <div class="modal-field">
        <label>期限（任意）</label>
        <input type="date" id="edit-deadline">
      </div>
      <div class="modal-field">
        <label>備考（任意）</label>
        <textarea id="edit-memo" placeholder="メモや補足を入力"></textarea>
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-save" id="save-btn" onclick="saveTask()">保存する</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwCfyiU-gtk86w92JUqGuoLUMdJltSZ6rf0W9tXOeOxYB0i90MeixoiM1-xdS3EtQK2/exec';
    const PASSWORD = 'PASSWORD_CHECK';
    let editingTaskId = null;
    let editUrgency = '';
    let allTasks = [];

    function login() {
      const input = document.getElementById('password').value;
      if (input === PASSWORD) {
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('list-area').style.display = 'block';
        loadTasks();
      } else {
        document.getElementById('login-error').textContent = 'パスワードが違います';
      }
    }

    async function loadTasks() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('task-list').innerHTML = '';
      try {
        const res = await fetch(GAS_URL + '?action=getTasks');
        const data = await res.json();
        allTasks = data.tasks || [];
        renderTasks(allTasks);
      } catch(e) {
        document.getElementById('loading').textContent = '読み込みに失敗しました。';
      }
    }

    function renderTasks(tasks) {
      document.getElementById('loading').style.display = 'none';
      const list = document.getElementById('task-list');
      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty">対応中のタスクはありません</div>';
        return;
      }
      list.innerHTML = tasks.map(task => {
        const urgencyEmoji = task.urgency === '高' ? '🔴' : task.urgency === '中' ? '🟡' : '🟢';
        const deadlineText = task.deadline ? formatDeadline(task.deadline) : '';
        return `
          <div class="task-card">
            <div class="task-name">${urgencyEmoji} ${task.name}</div>
            <div class="task-detail">種類：<span>${task.category}</span></div>
            <div class="task-detail">緊急度：<span class="urgency-${task.urgency}">${task.urgency}</span></div>
            <div class="task-detail">進捗：<span>${task.progress}</span></div>
            <div class="task-detail">状況：<span>${task.status}</span></div>
            ${deadlineText ? `<div class="task-detail">期限：<span>${deadlineText}</span></div>` : ''}
            ${task.memo ? `<div class="task-detail">備考：<span>${task.memo}</span></div>` : ''}
            <button class="btn-edit" onclick="openModal('${task.taskId}')">編集する</button>
          </div>
        `;
      }).join('');
    }

    function formatDeadline(str) {
      if (!str) return '';
      try {
        const d = new Date(str);
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + days[d.getDay()] + '）';
      } catch(e) { return str; }
    }

    function openModal(taskId) {
      const task = allTasks.find(t => t.taskId === taskId);
      if (!task) return;
      editingTaskId = taskId;
      document.getElementById('edit-name').value = task.name;
      document.getElementById('edit-category').value = task.category;
      document.getElementById('edit-progress').value = task.progress;
      document.getElementById('edit-status').value = task.status;
      document.getElementById('edit-deadline').value = task.deadline || '';
      document.getElementById('edit-memo').value = task.memo || '';
      selectEditUrgencyByValue(task.urgency);
      document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      editingTaskId = null;
    }

    function selectEditUrgency(level, el) {
      editUrgency = level;
      document.querySelectorAll('.urgency-btn').forEach(btn => { btn.className = 'urgency-btn'; });
      el.classList.add('selected-' + level);
    }

    function selectEditUrgencyByValue(level) {
      editUrgency = level;
      document.querySelectorAll('.urgency-btn').forEach(btn => {
        btn.className = 'urgency-btn';
        if (btn.textContent.trim() === level) btn.classList.add('selected-' + level);
      });
    }

    async function saveTask() {
      if (!editingTaskId) return;
      if (!editUrgency) { alert('緊急性を選択してください'); return; }

      const task = {
        taskId: editingTaskId,
        name: document.getElementById('edit-name').value.trim(),
        category: document.getElementById('edit-category').value,
        urgency: editUrgency,
        progress: document.getElementById('edit-progress').value,
        status: document.getElementById('edit-status').value,
        deadline: document.getElementById('edit-deadline').value || '',
        memo: document.getElementById('edit-memo').value || '',
      };

      document.getElementById('save-btn').disabled = true;

      try {
        const res = await fetch(GAS_URL + '?action=updateTask', {
          method: 'POST',
          body: JSON.stringify(task)
        });
        const data = await res.json();
        if (data.success) {
          closeModal();
          loadTasks();
        } else {
          alert('保存に失敗しました。');
        }
      } catch(e) {
        alert('保存に失敗しました。');
      }
      document.getElementById('save-btn').disabled = false;
    }
  </script>
</body>
</html>
