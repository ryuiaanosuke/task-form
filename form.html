<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f5f5;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 20px; color: #111; margin-bottom: 28px; text-align: center; }
    .field { margin-bottom: 24px; }
    label { display: block; font-size: 15px; color: #444; margin-bottom: 8px; font-weight: 600; }
    input[type="text"], input[type="date"], input[type="password"], select, textarea {
      width: 100%; padding: 16px; border: 1.5px solid #e0e0e0;
      border-radius: 12px; font-size: 16px; color: #111; background: #fafafa;
      appearance: none; -webkit-appearance: none;
    }
    textarea {
      height: 100px;
      resize: vertical;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #06C755; background: white;
    }
    .urgency-group { display: flex; gap: 12px; }
    .urgency-btn {
      flex: 1; padding: 16px 8px; border: 1.5px solid #e0e0e0;
      border-radius: 12px; background: #fafafa; font-size: 16px;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .urgency-btn.selected-高 { background: #fff0f0; border-color: #ff4444; color: #ff4444; font-weight: bold; }
    .urgency-btn.selected-中 { background: #fffbe6; border-color: #f5a623; color: #f5a623; font-weight: bold; }
    .urgency-btn.selected-低 { background: #f0fff4; border-color: #06C755; color: #06C755; font-weight: bold; }
    .submit-btn {
      width: 100%; padding: 18px; background: #06C755; color: white;
      border: none; border-radius: 14px; font-size: 18px; font-weight: bold;
      cursor: pointer; margin-top: 8px;
    }
    .submit-btn:disabled { background: #ccc; }
    .success { text-align: center; padding: 60px 20px; }
    .success .icon { font-size: 56px; margin-bottom: 16px; }
    .success p { color: #333; font-size: 18px; }
    .pw-screen { text-align: center; padding: 40px 0; }
    .pw-screen p { color: #888; font-size: 15px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="form-title">📋 タスク追加</h1>

    <!-- パスワード入力画面（URLにpwがない場合） -->
    <div id="pw-area" style="display:none">
      <div class="pw-screen">
        <p>パスワードを入力してください</p>
        <div class="field">
          <input type="password" id="manual-password" placeholder="パスワード">
        </div>
        <button class="submit-btn" onclick="checkManualPassword()">確認</button>
        <p id="pw-error" style="color:#ff4444;margin-top:12px;font-size:14px;"></p>
      </div>
    </div>

    <!-- メインフォーム -->
    <div id="form-area" style="display:none">
      <div class="field">
        <label>タスク名</label>
        <input type="text" id="taskName" placeholder="例：●●社_事業計画書作成">
      </div>
      <div class="field">
        <label>種類</label>
        <select id="category">
          <option value="補助金業務">補助金業務</option>
          <option value="BeFP業務">BeFP業務</option>
          <option value="顧客対応">顧客対応</option>
          <option value="財務">財務</option>
          <option value="プライベート">プライベート</option>
          <option value="業務指示">業務指示</option>
        </select>
      </div>
      <div class="field">
        <label>緊急性</label>
        <div class="urgency-group">
          <div class="urgency-btn" onclick="selectUrgency('高', this)">高</div>
          <div class="urgency-btn" onclick="selectUrgency('中', this)">中</div>
          <div class="urgency-btn" onclick="selectUrgency('低', this)">低</div>
        </div>
      </div>
      <div class="field">
        <label>進捗</label>
        <select id="progress">
          <option value="0%">0%</option>
          <option value="10%">10%</option>
          <option value="20%">20%</option>
          <option value="30%">30%</option>
          <option value="40%">40%</option>
          <option value="50%">50%</option>
          <option value="60%">60%</option>
          <option value="70%">70%</option>
          <option value="80%">80%</option>
          <option value="90%">90%</option>
          <option value="100%">100%</option>
        </select>
      </div>
      <div class="field">
        <label>進捗状況</label>
        <select id="status">
          <option value="未対応">未対応</option>
          <option value="進捗中">進捗中</option>
          <option value="待ち（顧客・取引先）">待ち（顧客・取引先）</option>
          <option value="待ち（スタッフ）">待ち（スタッフ）</option>
          <option value="スタッフ対応中">スタッフ対応中</option>
          <option value="完了">完了</option>
        </select>
      </div>
      <div class="field">
        <label>期限（任意）</label>
        <input type="date" id="deadline">
      </div>
      <div class="field">
        <label>備考（任意）</label>
        <textarea id="memo" placeholder="メモや補足を入力"></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitTask()">登録する</button>
    </div>

    <!-- 完了画面 -->
    <div id="success-area" style="display:none">
      <div class="success">
        <div class="icon">✅</div>
        <p id="success-msg">タスクを登録しました！</p>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwCfyiU-gtk86w92JUqGuoLUMdJltSZ6rf0W9tXOeOxYB0i90MeixoiM1-xdS3EtQK2/exec';
    const LIFF_ID = '2009673261-xpara1hm';
    let selectedUrgency = '';
    let editTaskId = null;
    let sessionPassword = '';

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
      } catch(e) {
        console.error('LIFF init error:', e);
      }

      const params = new URLSearchParams(window.location.search);
      const pw = params.get('pw');
      const taskId = params.get('taskId');

      if (taskId) {
        editTaskId = taskId;
        document.getElementById('form-title').textContent = '✏️ タスク編集';
        document.getElementById('taskName').value = params.get('name') || '';
        document.getElementById('category').value = params.get('category') || '';
        document.getElementById('progress').value = params.get('progress') || '0%';
        document.getElementById('status').value = params.get('status') || '未対応';
        document.getElementById('deadline').value = params.get('deadline') || '';
        document.getElementById('memo').value = params.get('memo') || '';
        selectUrgencyByValue(params.get('urgency') || '');
        document.getElementById('submitBtn').textContent = '更新する';
      }

      if (pw) {
        sessionPassword = pw;
        document.getElementById('form-area').style.display = 'block';
      } else {
        document.getElementById('pw-area').style.display = 'block';
      }
    }

    async function checkManualPassword() {
      const input = document.getElementById('manual-password').value;
      if (!input) return;
      try {
        const res = await fetch(GAS_URL + '?action=checkPassword&password=' + encodeURIComponent(input));
        const data = await res.json();
        if (data.success) {
          sessionPassword = input;
          document.getElementById('pw-area').style.display = 'none';
          document.getElementById('form-area').style.display = 'block';
        } else {
          document.getElementById('pw-error').textContent = 'パスワードが違います';
        }
      } catch(e) {
        document.getElementById('pw-error').textContent = '通信エラーが発生しました';
      }
    }

    function selectUrgency(level, el) {
      selectedUrgency = level;
      document.querySelectorAll('.urgency-btn').forEach(btn => { btn.className = 'urgency-btn'; });
      el.classList.add('selected-' + level);
    }

    function selectUrgencyByValue(level) {
      selectedUrgency = level;
      document.querySelectorAll('.urgency-btn').forEach(btn => {
        btn.className = 'urgency-btn';
        if (btn.textContent.trim() === level) {
          btn.classList.add('selected-' + level);
        }
      });
    }

    async function submitTask() {
      const name = document.getElementById('taskName').value.trim();
      if (!name) { alert('タスク名を入力してください'); return; }
      if (!selectedUrgency) { alert('緊急性を選択してください'); return; }

      const task = {
        name: name,
        category: document.getElementById('category').value,
        urgency: selectedUrgency,
        progress: document.getElementById('progress').value,
        status: document.getElementById('status').value,
        deadline: document.getElementById('deadline').value || '',
        memo: document.getElementById('memo').value || '',
        password: sessionPassword,
      };

      document.getElementById('submitBtn').disabled = true;

      const action = editTaskId ? 'updateTask' : 'addTask';
      if (editTaskId) task.taskId = editTaskId;

      try {
        const res = await fetch(GAS_URL + '?action=' + action, {
          method: 'POST',
          body: JSON.stringify(task)
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('form-area').style.display = 'none';
          document.getElementById('success-area').style.display = 'block';
          document.getElementById('success-msg').textContent = editTaskId ? 'タスクを更新しました！' : 'タスクを登録しました！';
          setTimeout(() => {
            if (liff.isInClient()) liff.closeWindow();
          }, 1500);
        } else {
          alert('パスワードが違うか、処理に失敗しました。');
          document.getElementById('submitBtn').disabled = false;
        }
      } catch(e) {
        alert(editTaskId ? '更新に失敗しました。' : '登録に失敗しました。');
        document.getElementById('submitBtn').disabled = false;
      }
    }

    init();
  </script>
</body>
</html>
